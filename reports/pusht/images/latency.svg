<svg xmlns='http://www.w3.org/2000/svg' width='920' height='420' viewBox='0 0 920 420'><rect width='920' height='420' fill='white'/><style>text{font-family:Arial,sans-serif;fill:#172033}.title{font-size:22px;font-weight:700}.label{font-size:16px}.small{font-size:13px;fill:#4b5563}</style><text x='36' y='38' class='title'>Observed inference latency (8 seeds, mean ± SD)</text><text x='36' y='70' class='small'>NVIDIA RTX PRO 6000 Blackwell; batch one; four-frame chunks</text><line x1='90' y1='350' x2='860' y2='350' stroke='#9ca3af'/><rect x='160' y='340.8' width='120' height='9.2' rx='5' fill='#4C78A8'/><line x1='220' y1='340.4' x2='220' y2='341.2' stroke='#111827' stroke-width='2'/><line x1='208' y1='340.4' x2='232' y2='340.4' stroke='#111827' stroke-width='2'/><text x='220' y='378' text-anchor='middle' class='label'>MSE</text><text x='220' y='328.4' text-anchor='middle' class='label'>1.058 ms</text><rect x='400' y='340.8' width='120' height='9.2' rx='5' fill='#E45756'/><line x1='460' y1='340.5' x2='460' y2='341.1' stroke='#111827' stroke-width='2'/><line x1='448' y1='340.5' x2='472' y2='340.5' stroke='#111827' stroke-width='2'/><text x='460' y='378' text-anchor='middle' class='label'>Drift</text><text x='460' y='328.5' text-anchor='middle' class='label'>1.052 ms</text><rect x='640' y='133.8' width='120' height='216.2' rx='5' fill='#72B7B2'/><line x1='700' y1='128.7' x2='700' y2='138.9' stroke='#111827' stroke-width='2'/><line x1='688' y1='128.7' x2='712' y2='128.7' stroke='#111827' stroke-width='2'/><text x='700' y='378' text-anchor='middle' class='label'>Diffusion-20</text><text x='700' y='116.7' text-anchor='middle' class='label'>24.840 ms</text><text x='54' y='220' transform='rotate(-90 54 220)' text-anchor='middle' class='label'>milliseconds per generated frame ↓</text><text x='460' y='408' text-anchor='middle' class='small'>Drift is 23.6× faster than the 20-step sampler; one-pass MSE and Drift are matched.</text></svg>